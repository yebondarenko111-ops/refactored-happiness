<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Три Коти: Online Hockey</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>
    <div id="auth-box" class="card">
        <h1>Три Кота Хокей</h1>
        <input id="u-login" placeholder="Логін">
        <input id="u-pass" type="password" placeholder="Пароль">
        <div class="row">
            <button class="btn blue" onclick="game.auth('login')">ВХІД</button>
            <button class="btn white" onclick="game.auth('register')">РЕЄСТРАЦІЯ</button>
        </div>
    </div>

    <div id="lobby" class="card" style="display:none">
        <h2 id="hello">Привіт!</h2>
        <div class="elo-badge">🏆 ELO: <span id="elo-val">200</span></div>
        <div class="hero-grid">
            <button id="h-korzhik" class="h-card orange" onclick="game.setHero('korzhik')">Коржик</button>
            <button id="h-karamelka" class="h-card pink" onclick="game.setHero('karamelka')">Карамелька</button>
            <button id="h-kompot" class="h-card green" onclick="game.setHero('kompot')">Компот</button>
            <button id="h-gona" class="h-card gray" onclick="game.setHero('gona')">Гоня</button>
        </div>
        <button id="search-btn" class="btn orange-btn" onclick="game.startSearch()">ШУКАТИ ОНЛАЙН ГРУ</button>
    </div>

    <div id="game-ui" style="display:none">
        <div class="score-top"><span id="score-text">0 : 0</span></div>
        <canvas id="gameCanvas" width="1000" height="600"></canvas>
    </div>

    <script src="js/game.js"></script>
</body>
</html>
