<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Три Кота: Хоккей Online</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>
    <div id="auth-box" class="main-card">
        <h1>Три Кота Хоккей</h1>
        <input id="u-login" placeholder="Логин">
        <input id="u-pass" type="password" placeholder="Пароль">
        <div class="row">
            <button class="btn blue" onclick="game.auth('login')">ВХОД</button>
            <button class="btn white" onclick="game.auth('register')">РЕГИСТРАЦИЯ</button>
        </div>
    </div>

    <div id="lobby" class="main-card" style="display:none">
        <h2 id="hello">Привет!</h2>
        <div class="elo-badge">🏆 ELO: <span id="elo-val">200</span></div>
        <div class="hero-grid">
            <button onclick="game.setHero('korzhik')" id="h-korzhik" class="h-card orange">Коржик</button>
            <button onclick="game.setHero('karamelka')" id="h-karamelka" class="h-card pink">Карамелька</button>
            <button onclick="game.setHero('kompot')" id="h-kompot" class="h-card green">Компот</button>
            <button onclick="game.setHero('gona')" id="h-gona" class="h-card gray">Гоня</button>
        </div>
        <button class="btn orange-btn" onclick="game.startMatch('bot')">ТРЕНИРОВКА (БОТ)</button>
        <button class="btn blue-btn" onclick="game.findOnline()">ОНЛАЙН 1 на 1</button>
    </div>

    <div id="game-ui" style="display:none">
        <div class="score-top"><span id="score-text">0 : 0</span></div>
        <canvas id="gameCanvas" width="1000" height="600"></canvas>
    </div>

    <script src="js/game.js"></script>
</body>
</html>
